<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Саида ❤️</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffe6f0, #ffd6eb);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* карточка */
.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    max-width: 400px;
    z-index: 2;
}

h1 { color: #ff4d88; }
p { font-size: 18px; color: #555; }

.buttons {
    margin-top: 20px;
    position: relative;
    height: 120px;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

#yes {
    background-color: #ff4d88;
    color: white;
}

#no {
    background-color: #ccc;
    position: absolute;
}

/* попап */
#popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    max-width: 400px;
    z-index: 3;
}

/* сердечки */
.heart {
    position: absolute;
    bottom: -20px;
    color: #ff4d88;
    font-size: 20px;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    to {
        transform: translateY(-110vh);
        opacity: 0;
    }
}
</style>
</head>
<body>

<div class="card">
    <h1>Саида 💖</h1>
    <p>Пойдешь ли ты со мной на свидание<br>
    <b>7 июля с 16:00 до 22:00?</b></p>

    <div class="buttons">
        <button id="yes">Да 💕</button>
        <button id="no">Нет 😢</button>
    </div>
</div>

<div id="popup">
    <h2>Спасибо тебе большое, котенок 💖</h2>
    <p>
        16:00–17:40 — гулять 🌸<br>
        18:00–19:00 — ужин 🍽️<br>
        19:00–20:00 — гулять 🌷<br>
        20:00–20:30 — секретик 💫<br>
        20:30–21:30 — встреча заката 🌅<br>
        21:58 — обнимашки у подъезда №5 🤗<br>
        22:00 — Саида дома 🏡
    </p>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const popup = document.getElementById("popup");

// кнопка "Нет" убегает
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * 250 - 125;
    const y = Math.random() * 250 - 125;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});

// при нажатии "Да"
yesBtn.addEventListener("click", () => {
    popup.style.display = "block";
});

// генерация сердечек
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 25) + "px";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
